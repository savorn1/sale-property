spring.application.name=student
server.port=8083

# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/java
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation= true
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto= update

# Security
#spring.security.user.name=sam
#spring.security.user.password=MC5WdsFN3U9pK7FDuSMY5nA8XF6agDGYRc4AqkZ4

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# JWT
jwt.secret=your_jwt_secret_here_change_in_production
jwt.expiration=86400000



# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=123456
spring.data.redis.database=0
redis.expire=1
redis.permission.cache.ttl=5

# Eureka
#eureka.client.service-url.defaultZone=http://eureka:8761/eureka/

# MinIO / S3
aws.access-key=minioadmin
aws.secret-key=minioadmin
aws.region=us-east-1
aws.s3.bucket=visa-documents
aws.s3.endpoint=http://localhost:9000